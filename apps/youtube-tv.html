<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>YouTube TV</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--bg2:#1a1a1a;--bg3:#252525;--border:#333;--text:#ccc;--text-dim:#666;--accent:#ff4444;--accent-glow:#ff444488;--highlight:#2a2a3a;--now-line:#ff4444;--font:system-ui,-apple-system,sans-serif;--grid-h:44px;--col-w:52px;--col-h:56px}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}
#app{max-width:1200px;margin:0 auto;padding:12px 16px}
/* Header */
header{display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:8px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px}
header h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px;white-space:nowrap}
#tv-title{background:linear-gradient(90deg,#ff4444,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sched-ctrl{display:flex;align-items:center;gap:6px;margin-left:auto;font-size:13px;color:var(--text-dim)}
.sched-ctrl input{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px;width:220px}
.sched-ctrl input:focus{outline:none;border-color:var(--accent)}
.sched-ctrl button{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.sched-ctrl button:hover{background:var(--highlight)}
/* Day tabs */
#day-tabs{display:flex;gap:4px;padding:4px 0 8px}
.day-tab{background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.day-tab:hover{background:var(--bg3);color:var(--text)}
.day-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.day-tab.today{border-color:var(--accent-glow)}
/* Grid */
#grid-wrap{position:relative;overflow-x:auto;border:1px solid var(--border);border-radius:8px;background:var(--bg2);margin-bottom:12px}
#grid-inner{position:relative;min-width:780px}
#time-headers{display:flex;height:32px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5}
.time-label{flex-shrink:0;text-align:center;font-size:10px;color:var(--text-dim);padding-top:8px;border-left:1px solid var(--border);height:100%}
.time-label.major{font-weight:600;color:var(--text);font-size:11px}
#slots-area{position:relative;min-height:100px}
.slot-row{display:flex;border-bottom:1px solid var(--border);transition:.15s;cursor:pointer}
.slot-row:last-child{border-bottom:none}
.slot-row:hover{background:var(--highlight)}
.slot-row.active-slot{background:var(--accent-glow)}
.slot-cell{flex-shrink:0;height:44px;border-left:1px solid var(--border);padding:4px 6px;font-size:11px;overflow:hidden;cursor:pointer;transition:.1s;display:flex;flex-direction:column;justify-content:center}
.slot-cell:first-child{border-left:none}
.slot-cell .s-name{font-weight:600;color:#fff;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-cell .s-time{font-size:10px;color:var(--text-dim)}
.slot-cell.active{background:var(--accent-glow);box-shadow:inset 0 0 12px var(--accent-glow)}
.slot-cell.off-air{background:var(--bg);cursor:default}
.slot-cell.off-air:hover{background:var(--bg)}
/* Now line */
#now-line{position:absolute;top:0;bottom:0;width:2px;background:var(--now-line);z-index:10;pointer-events:none;display:none;box-shadow:0 0 8px var(--accent-glow)}
#now-line::before{content:'';position:absolute;top:-4px;left:-4px;width:10px;height:10px;background:var(--now-line);border-radius:50%}
/* Player */
#player-area{display:grid;grid-template-columns:1fr 320px;gap:12px;min-height:300px}
#player-container{position:relative;background:#000;border-radius:8px;overflow:hidden;aspect-ratio:16/9}
#player{width:100%;height:100%;border:none}
#side-panel{padding:8px}
#now-playing-info{margin-bottom:12px}
#now-playing-info h3{font-size:15px;color:#fff;margin-bottom:2px}
#now-playing-info .meta{font-size:12px;color:var(--text-dim)}
#slot-list{display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto}
.mini-slot{padding:6px 8px;border-radius:4px;font-size:12px;cursor:pointer;background:var(--bg2);border:1px solid var(--border);transition:.1s}
.mini-slot:hover{background:var(--highlight)}
.mini-slot.active{background:var(--accent-glow);border-color:var(--accent)}
.mini-slot .ms-name{color:#fff;font-weight:500}
.mini-slot .ms-time{color:var(--text-dim);font-size:11px}
/* Channel selector */
#channel-selector{margin-bottom:12px;padding-top:8px;border-top:1px solid var(--border)}
#channel-selector h4{font-size:11px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.ch-pills{display:flex;flex-wrap:wrap;gap:4px}
.ch-pill{font-size:11px;padding:3px 10px;border-radius:12px;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);transition:.1s}
.ch-pill:hover{background:var(--highlight);color:var(--text)}
.ch-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ch-pill .ch-label{font-weight:500}
.ch-pill .ch-badge{font-size:9px;opacity:0.7;margin-left:4px}
/* Static noise */
#noise-screen{position:absolute;inset:0;display:none;z-index:2;background:#000}
#noise-screen.active{display:block}
#noise-canvas{width:100%;height:100%;image-rendering:pixelated;opacity:0.7}
#noise-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-dim);font-size:18px;text-align:center;letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 20px #000;z-index:3;pointer-events:none}
#noise-label small{display:block;font-size:12px;opacity:0.5;margin-top:8px;letter-spacing:1px}
/* empty state */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text-dim)}
/* Loading */
#loading{display:none;text-align:center;padding:40px;color:var(--text-dim)}
.loader{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Schedule info bar */
#sched-info{font-size:11px;color:var(--text-dim);padding:4px 0;text-align:center;border-top:1px solid var(--border);margin-top:8px}
#sched-info a{color:var(--accent)}
/* Responsive */
@media(max-width:768px){
  #player-area{grid-template-columns:1fr}
  .sched-ctrl input{width:140px}
  header h1{font-size:18px}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>📺 <span id="tv-title">YouTube TV</span></h1>
    <div class="sched-ctrl">
      <span>📋</span>
      <input id="sched-url" type="url" placeholder="Schedule JSON URL (optional)" spellcheck="false"/>
      <button id="load-btn">Load</button>
    </div>
  </header>

  <div id="day-tabs"></div>

  <div id="grid-wrap">
    <div id="grid-inner">
      <div id="time-headers"></div>
      <div id="slots-area">
        <div id="now-line"></div>
        <div id="loading">
          <div class="loader"></div>
          <div style="margin-top:12px">Loading schedule...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="player-area">
    <div id="player-container">
      <iframe id="player" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
      <div id="noise-screen">
        <canvas id="noise-canvas"></canvas>
        <div id="noise-label">📺 Off Air<small>Nothing scheduled right now</small></div>
      </div>
    </div>
    <div id="side-panel">
      <div id="now-playing-info">

        <div class="meta" id="np-meta">Click any time slot or wait for auto-play</div>
      </div>
      <div id="channel-selector" style="display:none">
        <h4>Channel</h4>
        <div class="ch-pills" id="ch-pills"></div>
      </div>
      <div id="slot-list"></div>
    </div>
  </div>

  <div id="sched-info"></div>
</div>

// ─── STATE ───
let schedule = null;
let currentDay = null;
let currentSlotId = null;
let noiseInterval = null;
let autoAdvanceTimer = null;
let activeChannelIndex = 0;
const DAYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const DAY_LABELS = {monday:'Mon',tuesday:'Tue',wednesday:'Wed',thursday:'Thu',friday:'Fri',saturday:'Sat',sunday:'Sun'};
const GRID_START_HOUR = 6; // 6 AM
const GRID_END_HOUR = 24;  // midnight
const HALF_HOURS = (GRID_END_HOUR - GRID_START_HOUR) * 2;

// ─── HELPERS ───
function timeToHalfHour(str) {
  const [h,m] = str.split(':').map(Number);
  return (h - GRID_START_HOUR) * 2 + (m >= 30 ? 1 : 0);
}

function getNow() {
  const d = new Date();
  return {
    day: DAYS[(d.getDay() + 6) % 7], // mon=0
    hour: d.getHours(),
    min: d.getMinutes(),
    halfOffset: (d.getHours() - GRID_START_HOUR) * 2 + (d.getMinutes() >= 30 ? 1 : 0) + (d.getMinutes() % 30) / 30
  };
}

function getDaySlots(day) {
  if (!schedule || !schedule.days || !schedule.days[day]) return [];
  return schedule.days[day].sort((a,b) => a.start.localeCompare(b.start));
}

function findCurrentSlot(day) {
  const slots = getDaySlots(day);
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  for (const s of slots) {
    const [sh, sm] = s.start.split(':').map(Number);
    const startMin = sh * 60 + sm;
    const endMin = startMin + s.duration;
    if (nowMin >= startMin && nowMin < endMin) return s;
  }
  return null;
}

// ─── MIGRATION ───
function migrateSchedule(sched) {
  if (!sched || !sched.days) return;
  for (const day of DAYS) {
    const slots = sched.days[day];
    if (!slots) continue;
    for (const slot of slots) {
      if (slot.channelId && !slot.channels) {
        slot.channels = [{ id: slot.channelId, name: slot.name }];
        delete slot.channelId;
      }
    }
  }
}

// ─── SCHEDULE LOADING ───
async function loadSchedule(url) {
  showLoading(true);
  try {
    let data;
    if (url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      data = await resp.json();
      localStorage.setItem('ytv_schedule_url', url);
      localStorage.setItem('ytv_schedule_cache', JSON.stringify({url, data, ts: Date.now()}));
    } else {
      data = DEFAULT_SCHEDULE;
      localStorage.removeItem('ytv_schedule_url');
    }
    schedule = data;
    document.getElementById('tv-title').textContent = schedule.title || 'YouTube TV';
    initApp();
  } catch(e) {
    // Try cache
    const cached = localStorage.getItem('ytv_schedule_cache');
    if (cached) {
      const {data} = JSON.parse(cached);
      if (data) {
        schedule = data;
        document.getElementById('tv-title').textContent = schedule.title || 'YouTube TV';
        initApp();
        setSchedInfo(`⚠️ Offline — loaded cached schedule`);
        showLoading(false);
        return;
      }
    }
    setSchedInfo(`❌ Failed to load: ${e.message}`);
    schedule = DEFAULT_SCHEDULE;
    document.getElementById('tv-title').textContent = schedule.title || 'YouTube TV';
    initApp();
  }
  showLoading(false);
}

function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'block' : 'none';
}

function setSchedInfo(msg) {
  document.getElementById('sched-info').innerHTML = msg;
}

// ─── INIT ───
function initApp() {
  migrateSchedule(schedule);
  const now = getNow();
  currentDay = now.day;
  renderTabs();
  renderDay(currentDay);
  startAutoAdvance();
  // Load URL param
  const params = new URLSearchParams(window.location.search);
  const schedUrl = params.get('s') || '';
  if (schedUrl) {
    document.getElementById('sched-url').value = schedUrl;
  }
}

function renderTabs() {
  const container = document.getElementById('day-tabs');
  container.innerHTML = '';
  const now = getNow();
  for (const day of DAYS) {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (day === currentDay ? ' active' : '');
    if (day === now.day) tab.classList.add('today');
    tab.textContent = DAY_LABELS[day];
    tab.dataset.day = day;
    tab.addEventListener('click', () => switchDay(day));
    container.appendChild(tab);
  }
}

function switchDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.day-tab[data-day="${day}"]`).classList.add('active');
  renderDay(day);
}

// ─── RENDER GRID ───
function renderDay(day) {
  const slotsArea = document.getElementById('slots-area');
  const timeHeaders = document.getElementById('time-headers');
  const nowLine = document.getElementById('now-line');

  // Time headers
  timeHeaders.innerHTML = '';
  for (let i = 0; i < HALF_HOURS; i++) {
    const h = GRID_START_HOUR + Math.floor(i / 2);
    const isHalf = i % 2 === 1;
    const label = document.createElement('div');
    label.className = 'time-label' + (isHalf ? '' : ' major');
    label.style.width = '52px';
    label.textContent = isHalf ? '' : `${h.toString().padStart(2,'0')}:00`;
    timeHeaders.appendChild(label);
  }

  // Slots
  const slots = getDaySlots(day);
  const now = getNow();
  const nowMin = now.hour * 60 + now.min;
  slotsArea.innerHTML = '';

  if (slots.length === 0) {
    slotsArea.innerHTML = `<div id="empty-state"><div style="font-size:32px;margin-bottom:8px">📺</div><div>No shows scheduled for ${DAY_LABELS[day]}day</div><div style="font-size:12px;color:var(--text-dim);margin-top:4px">Edit your schedule.json to add slots</div></div>`;
    nowLine.style.display = 'none';
    updateNowLine(null);
    return;
  }

  let currentSlot = null;
  for (const s of slots) {
    const [sh, sm] = s.start.split(':').map(Number);
    const startMin = sh * 60 + sm;
    const endMin = startMin + s.duration;
    const isActive = (nowMin >= startMin && nowMin < endMin);
    if (isActive) currentSlot = s;

    const row = document.createElement('div');
    row.className = 'slot-row' + (isActive ? ' active-slot' : '');
    row.dataset.slotId = s.id;

    // Render cells for each half-hour
    for (let i = 0; i < HALF_HOURS; i++) {
      const cellMin = GRID_START_HOUR * 60 + i * 30;
      const cellEnd = cellMin + 30;
      const cell = document.createElement('div');
      cell.className = 'slot-cell';
      cell.style.width = '52px';

      // Check if this half-hour falls within slot
      if (cellMin >= startMin && cellMin < endMin) {
        const isFirst = (cellMin === startMin);
        if (isFirst) {
          const durStr = s.duration >= 60
            ? `${Math.floor(s.duration/60)}h ${s.duration%60 > 0 ? s.duration%60 + 'm' : ''}`
            : `${s.duration}m`;
          cell.innerHTML = `<div class="s-name">${s.name}</div><div class="s-time">${s.start} · ${durStr}</div>`;
        }
        // Span visual: color the cell
        const pct = Math.min(100, ((cellMin - startMin) / s.duration) * 100);
        cell.style.background = isActive
          ? `linear-gradient(135deg, rgba(255,68,68,0.15), rgba(255,136,0,0.08))`
          : `linear-gradient(135deg, rgba(255,255,255,0.04), transparent)`;
        if (isActive) cell.classList.add('active');
      } else {
        // Empty cell
        cell.style.background = 'transparent';
      }

      cell.dataset.slotId = s.id;
      cell.dataset.cellStart = cellMin;
      row.appendChild(cell);
    }

    row.addEventListener('click', () => playSlot(s, day));
    slotsArea.appendChild(row);
  }

  // Now line
  nowLine.style.display = 'block';
  updateNowLine(now);

  // Update right panel
  updateNowPlaying(currentSlot, day);
  renderSlotList(day, currentSlot);

  // Auto-play current if nothing playing
  if (currentSlot && (!currentSlotId || currentSlotId !== currentSlot.id)) {
    playSlot(currentSlot, day);
  } else if (!currentSlot) {
    showNoiseScreen(true);
    document.getElementById('np-title').textContent = '📡 Off Air';
    document.getElementById('np-meta').textContent = 'No show scheduled right now';
    document.getElementById('channel-selector').style.display = 'none';
    currentSlotId = null;
  }
}

function updateNowLine(now) {
  const line = document.getElementById('now-line');
  if (!now) { now = getNow(); }
  const offset = now.halfOffset;
  const totalSlots = HALF_HOURS;
  const pct = (offset / totalSlots) * 100;
  line.style.left = `calc(${pct}% + ${(offset % 1) * 52}px)`;
  // Show/hide based on grid hours
  if (now.hour < GRID_START_HOUR || now.hour >= GRID_END_HOUR) {
    line.style.display = 'none';
  } else {
    line.style.display = 'block';
  }
}

// ─── PLAYER ───
function playSlot(slot, day) {
  if (!slot) return;
  // Reset channel index for new slot
  activeChannelIndex = 0;
  currentSlotId = slot.id;
  playChannel(slot, day);
}

function playChannel(slot, day) {
  const channels = slot.channels;
  if (!channels || channels.length === 0) return;

  const channel = channels[activeChannelIndex] || channels[0];
  const listId = 'UU' + channel.id.slice(2);
  const player = document.getElementById('player');

  player.src = `https://www.youtube.com/embed/videoseries?list=${listId}&index=1&autoplay=1&rel=0`;
  showNoiseScreen(false);

  document.getElementById('np-title').textContent = `▶ ${slot.name}`;
  document.getElementById('np-meta').textContent = `${slot.start} · ${slot.duration}min · ${channel.name}`;

  // Scroll to player
  document.getElementById('player-container').scrollIntoView({behavior:'smooth',block:'nearest'});

  // Update grid highlight
  document.querySelectorAll('.slot-row').forEach(r => r.classList.remove('active-slot'));
  const activeRow = document.querySelector(`.slot-row[data-slot-id="${slot.id}"]`);
  if (activeRow) activeRow.classList.add('active-slot');

  renderSlotList(day, slot);
  renderChannelSelector(slot, day);
}

function switchChannel(slot, day, index) {
  if (index === activeChannelIndex) return;
  activeChannelIndex = index;
  playChannel(slot, day);
}

function renderChannelSelector(slot, day) {
  const container = document.getElementById('channel-selector');
  const pills = document.getElementById('ch-pills');

  if (!slot || !slot.channels || slot.channels.length <= 1) {
    container.style.display = 'none';
    return;
  }

  container.style.display = 'block';
  pills.innerHTML = '';

  for (let i = 0; i < slot.channels.length; i++) {
    const ch = slot.channels[i];
    const pill = document.createElement('span');
    pill.className = 'ch-pill' + (i === activeChannelIndex ? ' active' : '');
    const badge = i === 0 ? 'Primary' : 'Alt ' + i;
    pill.innerHTML = `<span class="ch-label">${ch.name}</span><span class="ch-badge">${badge}</span>`;
    pill.addEventListener('click', () => switchChannel(slot, day, i));
    pills.appendChild(pill);
  }
}

function showNoiseScreen(show) {
  const noise = document.getElementById('noise-screen');
  const player = document.getElementById('player');
  if (show) {
    noise.classList.add('active');
    player.style.display = 'none';
    startNoise();
  } else {
    noise.classList.remove('active');
    player.style.display = 'block';
    stopNoise();
  }
}

// ─── STATIC NOISE ───
function startNoise() {
  const canvas = document.getElementById('noise-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 320;
  canvas.height = 180;

  function frame() {
    if (!document.getElementById('noise-screen').classList.contains('active')) return;
    const imageData = ctx.createImageData(320, 180);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() * 256;
      data[i] = v;     // R
      data[i+1] = v;   // G
      data[i+2] = v;   // B
      data[i+3] = 255; // A
    }
    ctx.putImageData(imageData, 0, 0);
    noiseInterval = requestAnimationFrame(frame);
  }
  frame();
}

function stopNoise() {
  if (noiseInterval) {
    cancelAnimationFrame(noiseInterval);
    noiseInterval = null;
  }
}

// ─── AUTO ADVANCE ───
function startAutoAdvance() {
  if (autoAdvanceTimer) clearInterval(autoAdvanceTimer);
  autoAdvanceTimer = setInterval(() => {
    if (!schedule) return;
    const now = getNow();
    const day = now.day;
    // Update now line
    updateNowLine(now);

    // Check if day changed
    if (day !== currentDay) {
      currentDay = day;
      renderTabs();
      renderDay(day);
      return;
    }

    // Check if slot changed
    const currentSlot = findCurrentSlot(day);
    if (currentSlot && currentSlot.id !== currentSlotId) {
      playSlot(currentSlot, day);
      // Re-render grid to update highlights
      renderDay(day);
    } else if (!currentSlot && currentSlotId !== null) {
      // Went off-air
      showNoiseScreen(true);
      document.getElementById('np-title').textContent = '📡 Off Air';
      document.getElementById('np-meta').textContent = 'No show scheduled right now';
      document.getElementById('channel-selector').style.display = 'none';
      currentSlotId = null;
      renderSlotList(day, null);
    }

    // Update now line position smoothly
    updateNowLine(getNow());
  }, 10000); // check every 10s
}

// ─── SIDE PANEL ───
function updateNowPlaying(slot, day) {
  if (!slot) return;
  // handled in playSlot
}

function renderSlotList(day, active) {
  const list = document.getElementById('slot-list');
  const slots = getDaySlots(day);
  list.innerHTML = '';
  for (const s of slots) {
    const item = document.createElement('div');
    item.className = 'mini-slot' + (active && s.id === active.id ? ' active' : '');
    const altCount = s.channels ? s.channels.length - 1 : 0;
    const altStr = altCount > 0 ? ` (${altCount} alt)` : '';
    item.innerHTML = `<div class="ms-name">${s.name}${altStr}</div><div class="ms-time">${s.start} · ${s.duration}min</div>`;
    item.addEventListener('click', () => playSlot(s, day));
    list.appendChild(item);
  }
}

// ─── SCHEDULE URL LOADING ───
function handleLoadSchedule() {
  const url = document.getElementById('sched-url').value.trim();
  // Update URL param
  const params = new URLSearchParams(window.location.search);
  if (url) {
    params.set('s', url);
  } else {
    params.delete('s');
  }
  const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
  window.history.replaceState({}, '', newUrl);
  loadSchedule(url || null);
}

// ─── INIT ───
document.addEventListener('DOMContentLoaded', () => {
  // Load from URL param or cached
  const params = new URLSearchParams(window.location.search);
  const schedUrl = params.get('s') || localStorage.getItem('ytv_schedule_url') || '';

  // Check cache freshness
  const cached = localStorage.getItem('ytv_schedule_cache');
  if (cached) {
    const {url: cacheUrl, data, ts} = JSON.parse(cached);
    if (cacheUrl === schedUrl && data && Date.now() - ts < 3600000) {
      // Cache is fresh (1hr), use it
      schedule = data;
      document.getElementById('tv-title').textContent = schedule.title || 'YouTube TV';
      initApp();
      if (schedUrl) {
        document.getElementById('sched-url').value = schedUrl;
        setSchedInfo(`📋 Loaded from cache · <a href="${schedUrl}" target="_blank">${schedUrl}</a>`);
      }
      return;
    }
  }

  loadSchedule(schedUrl || null);

  // Button handler
  document.getElementById('load-btn').addEventListener('click', handleLoadSchedule);
  document.getElementById('sched-url').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLoadSchedule();
  });
});
</script>
