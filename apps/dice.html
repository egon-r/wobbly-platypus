<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dice</title>
<style>
  * { box-sizing: border-box; }
  body { background: #09090b; color: #e4e4e7; font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  .scene { perspective: 600px; width: 140px; height: 140px; margin-bottom: 2rem; }
  .cube { width: 140px; height: 140px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .cube.spinning { animation: tumble 0.6s ease-in-out infinite; }
  @keyframes tumble {
    0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
    25%  { transform: rotateX(180deg) rotateY(90deg) rotateZ(30deg); }
    50%  { transform: rotateX(360deg) rotateY(180deg) rotateZ(0deg); }
    75%  { transform: rotateX(540deg) rotateY(270deg) rotateZ(-30deg); }
    100% { transform: rotateX(720deg) rotateY(360deg) rotateZ(0deg); }
  }

  .face { position: absolute; width: 140px; height: 140px; border-radius: 16px; background: #f5f5f0; border: none; }
  .face .d { position: absolute; width: 22px; height: 22px; border-radius: 50%; background: #18181b; }

  .face-1 { transform: rotateX(0deg) translateZ(70px); }
  .face-6 { transform: rotateX(180deg) translateZ(70px); }
  .face-2 { transform: rotateY(90deg) translateZ(70px); }
  .face-5 { transform: rotateY(-90deg) translateZ(70px); }
  .face-3 { transform: rotateX(90deg) translateZ(70px); }
  .face-4 { transform: rotateX(-90deg) translateZ(70px); }

  .btn {
    background: #18181b; border: 1px solid #27272a; color: #e4e4e7;
    font-size: 1rem; font-family: inherit; padding: 0.75rem 2rem;
    border-radius: 0.5rem; cursor: pointer; transition: border-color .15s, background .15s;
  }
  .btn:hover { border-color: #52525b; background: #1f1f23; }
  .btn:active { background: #27272a; }

  .result { font-size: 2rem; font-weight: 300; margin: 0 0 0.5rem 0; min-height: 2.5rem; color: #e4e4e7; }
  .history { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center; max-width: 200px; margin-top: 1.5rem; min-height: 2rem; }
  .history span {
    width: 28px; height: 28px; border-radius: 6px; background: #18181b; border: 1px solid #27272a;
    display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #a1a1aa;
  }
  .back { color: #52525b; font-size: 0.875rem; margin-top: 2rem; text-decoration: none; }
  .back:hover { color: #a1a1aa; }
  .created { color: #52525b; font-size: 0.75rem; margin-top: 0.5rem; }
</style>
</head>
<body>

<div class="result" id="result">1</div>

<div class="scene">
  <div class="cube" id="cube"></div>
</div>

<button class="btn" id="rollBtn">roll</button>

<div class="history" id="history"></div>

<a class="back" href="/apps/">back</a>
<p class="created">2026-07-09</p>

<script>
// pip positions as % of face width/height
// pips inset from edges — die-like spacing
const L = 22, C = 50, R = 78;
const T = 22, M = 50, B = 78;

const faceData = {
  1: [[C,T]],
  2: [[L,T], [R,B]],
  3: [[L,T], [C,M], [R,B]],
  4: [[L,T], [R,T], [L,B], [R,B]],
  5: [[L,T], [R,T], [C,M], [L,B], [R,B]],
  6: [[L,T], [R,T], [L,M], [R,M], [L,B], [R,B]],
};

const rotations = {
  1: 'rotateX(0deg) rotateY(0deg)',
  2: 'rotateX(0deg) rotateY(-90deg)',
  3: 'rotateX(-90deg) rotateY(0deg)',
  4: 'rotateX(90deg) rotateY(0deg)',
  5: 'rotateX(0deg) rotateY(90deg)',
  6: 'rotateX(180deg) rotateY(0deg)',
};

const cube = document.getElementById('cube');
const resultEl = document.getElementById('result');
const historyEl = document.getElementById('history');
const rollBtn = document.getElementById('rollBtn');

for (let n = 1; n <= 6; n++) {
  const el = document.createElement('div');
  el.className = `face face-${n}`;
  for (const [x, y] of faceData[n]) {
    const dot = document.createElement('div');
    dot.className = 'd';
    dot.style.left = x + '%';
    dot.style.top = y + '%';
    dot.style.transform = 'translate(-50%, -50%)';
    el.appendChild(dot);
  }
  cube.appendChild(el);
}

cube.style.transform = rotations[1];

let rolling = false;
let history = [];

function roll() {
  if (rolling) return;
  rolling = true;
  rollBtn.disabled = true;

  const value = Math.floor(Math.random() * 6) + 1;

  cube.classList.add('spinning');

  setTimeout(() => {
    cube.classList.remove('spinning');
    cube.style.transform = rotations[value];
    resultEl.textContent = value;
    history.unshift(value);
    if (history.length > 20) history.pop();
    renderHistory();
    rolling = false;
    rollBtn.disabled = false;
  }, 500);
}

function renderHistory() {
  historyEl.innerHTML = history.map(v => `<span>${v}</span>`).join('');
}

rollBtn.addEventListener('click', roll);
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); roll(); } });
</script>

</body>
</html>
