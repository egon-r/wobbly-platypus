<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>shader previewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:#09090b;
  color:#e4e4e7;
  font-family:system-ui,-apple-system,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:1rem
}
#app{
  width:min(1200px,100%);
  height:min(800px,90vh);
  display:flex;
  gap:1rem;
  background:#18181b;
  border:1px solid #27272a;
  border-radius:1rem;
  padding:1rem
}
#preview{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  min-width:0;
  position:relative
}
#preview canvas{
  display:block;
  border-radius:.5rem;
  background:#000;
  touch-action:none
}
#fs-btn{
  position:absolute;
  top:.5rem;
  right:.5rem;
  background:rgba(0,0,0,.55);
  color:#e4e4e7;
  border:1px solid rgba(255,255,255,.15);
  border-radius:.375rem;
  padding:.35rem .6rem;
  font-size:.8rem;
  cursor:pointer;
  backdrop-filter:blur(4px);
  transition:background .15s;
  touch-action:manipulation;
  z-index:2;
  line-height:1
}
#fs-btn:hover{background:rgba(0,0,0,.8)}
#preview.fullscreen{background:#000}
#preview.fullscreen canvas{border-radius:0}
#preview.fullscreen #fs-btn{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3)}
#zoom-indicator{
  position:absolute;
  bottom:.5rem;
  left:.5rem;
  background:rgba(0,0,0,.55);
  color:#e4e4e7;
  border:1px solid rgba(255,255,255,.15);
  border-radius:.375rem;
  padding:.25rem .5rem;
  font-size:.75rem;
  backdrop-filter:blur(4px);
  display:none;
  pointer-events:none;
  z-index:2;
  line-height:1
}
#zoom-indicator.show{display:block}
#panel{
  width:420px;
  display:flex;
  flex-direction:column;
  gap:.5rem;
  min-width:0
}
#panel-header{
  display:flex;
  gap:.5rem;
  align-items:center;
  flex-wrap:wrap
}
.back-link{
  color:#52525b;
  text-decoration:none;
  font-size:.8rem;
  white-space:nowrap;
  transition:color .15s;
  padding:.25rem 0
}
.back-link:hover{color:#a1a1aa}
#panel-header select{
  flex:1;
  background:#09090b;
  color:#e4e4e7;
  border:1px solid #27272a;
  border-radius:.375rem;
  padding:.5rem .75rem;
  font-size:.875rem;
  cursor:pointer;
  font-family:system-ui,sans-serif;
  min-width:0;
  appearance:auto;
  -webkit-appearance:auto
}
#panel-header select:focus{outline:none;border-color:#6366f1}
#panel textarea{
  flex:1;
  background:#09090b;
  color:#e4e4e7;
  border:1px solid #27272a;
  border-radius:.5rem;
  padding:.75rem;
  font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  font-size:13px;
  line-height:1.5;
  resize:none;
  tab-size:2;
  white-space:pre;
  overflow:auto
}
#panel textarea:focus{outline:none;border-color:#6366f1}
#toolbar{
  display:flex;
  gap:.5rem;
  align-items:center;
  flex-wrap:wrap
}
#toolbar button{
  background:#27272a;
  color:#e4e4e7;
  border:1px solid #3f3f46;
  border-radius:.375rem;
  padding:.5rem 1rem;
  font-size:.875rem;
  cursor:pointer;
  transition:background .15s,border-color .15s;
  touch-action:manipulation
}
#toolbar button:hover{background:#3f3f46;border-color:#52525b}
#toolbar button.primary{background:#6366f1;border-color:#6366f1}
#toolbar button.primary:hover{background:#818cf8}

#errors{
  background:#1a0a0a;
  border:1px solid #7f1d1d;
  border-radius:.375rem;
  padding:.5rem .75rem;
  font-family:monospace;
  font-size:12px;
  color:#fca5a5;
  min-height:2rem;
  max-height:6rem;
  overflow:auto;
  display:none;
  white-space:pre-wrap;
  word-break:break-all
}
#errors.show{display:block}

/* mobile */
@media(max-width:900px){
  body{padding:0;align-items:stretch}
  #app{
    flex-direction:column;
    height:100dvh;
    width:100%;
    border-radius:0;
    border:none;
    padding:.5rem;
    gap:.5rem
  }
  #preview{flex:0 0 40vh}
  #panel{width:100%;flex:1;min-height:0}
  #panel textarea{
    font-size:14px;
    min-height:100px
  }
  #toolbar button{
    padding:.6rem 1rem;
    font-size:1rem;
    min-height:44px
  }
  #panel-header select{
    font-size:1rem;
    padding:.6rem .75rem;
    min-height:44px
  }
}
</style>
</head>
<body>
<div id="app">
  <div id="preview">
    <canvas id="c"></canvas>
    <button id="fs-btn">⛶</button>
    <div id="zoom-indicator"></div>
  </div>
  <div id="panel">
    <div id="panel-header">
      <select id="shader-select">
        <option value="raymarcher">Raymarcher Scene</option>
        <option value="plasma">Plasma</option>
        <option value="mandelbrot">Mandelbrot</option>
        <option value="waves">Ocean Waves</option>
        <option value="neon-cube">Neon Cube</option>
        <option value="water-3d">3D Water</option>
        <option value="burning-ship">Burning Ship</option>
        <option value="julia">Julia Set</option>
        <option value="deep-fractal">Deep Fractal</option>
      </select>
    </div>
    <textarea id="code" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
    <div id="toolbar">
      <button class="primary" id="compile">Compile</button>
      <button id="reset">Reset</button>
      <span style="flex:1"></span>
      <a class="back-link" href="/apps/">← back</a>
    </div>
    <div id="errors"></div>
  </div>
</div>
<script>
const SHADERS = {
raymarcher: `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 r;
uniform float t;
uniform vec3 eye, target;

float sdSphere(vec3 p, float r){return length(p)-r;}
float sdBox(vec3 p, vec3 b){vec3 d=abs(p)-b;return min(max(d.x,max(d.y,d.z)),0.0)+length(max(d,0.0));}
float sdRoundBox(vec3 p, vec3 b, float r){vec3 d=abs(p)-b;return min(max(d.x,max(d.y,d.z)),0.0)+length(max(d,0.0))-r;}
float sdPlane(vec3 p, float h){return p.y+h;}
float sdCylinder(vec3 p, vec2 h){vec2 d=abs(vec2(length(p.xz),p.y))-h;return min(max(d.x,d.y),0.0)+length(max(d,0.0));}
float sdTorus(vec3 p, vec2 t){vec2 q=vec2(length(p.xz)-t.x,p.y);return length(q)-t.y;}
float opSmoothUnion(float d1,float d2,float k){float h=clamp(.5+.5*(d2-d1)/k,0.,1.);return mix(d2,d1,h)-k*h*(1.-h);}
float opSmoothSub(float d1,float d2,float k){float h=clamp(.5-.5*(d2+d1)/k,0.,1.);return mix(d2,-d1,h)+k*h*(1.-h);}
float opSmoothInter(float d1,float d2,float k){float h=clamp(.5-.5*(d2-d1)/k,0.,1.);return mix(d2,d1,h)+k*h*(1.-h);}
vec3 opRep(vec3 p, vec3 c){return mod(p,c)-.5*c;}

float scene(vec3 p){
  float gnd = sdPlane(p, 0.0);
  float col = sdRoundBox(p-vec3(0,1.2,0), vec3(.5,1.2,.5), .15);
  vec3 q = p;
  q.y = mod(q.y+2.,4.)-2.;
  float cubes = sdBox(opRep(q+vec3(0,0,0), vec3(2.5,4.,2.5)), vec3(.35));
  float ring = sdTorus(p-vec3(0,1.5,-2.2), vec2(1.0,.12));
  float sphere = sdSphere(p-vec3(0,3.2,0), .6);
  float d = opSmoothUnion(gnd, col, .3);
  d = opSmoothUnion(d, cubes, .4);
  d = opSmoothUnion(d, ring, .2);
  d = opSmoothSub(d, sphere, .2);
  return d;
}

vec3 norm(vec3 p){
  vec2 e=vec2(.001,0);
  return normalize(vec3(scene(p+e.xyy)-scene(p-e.xyy),
                        scene(p+e.yxy)-scene(p-e.yxy),
                        scene(p+e.yyx)-scene(p-e.yyx)));
}

vec3 shade(vec3 p, vec3 n, vec3 rd){
  vec3 L = normalize(vec3(5,8,6));
  vec3 C = normalize(vec3(-3,4,-5));
  float amb = .15;
  float dif = max(dot(n,L),0.);
  float bac = max(dot(n,C),0.)*.3;
  float occ = .5+.5*scene(p+n*.15);
  float spec = pow(max(dot(reflect(-L,n),-rd),0.),32.);
  vec3 col = mix(vec3(.05,.1,.2), vec3(.9,.5,.2), p.y*.15+.5);
  col = mix(col, vec3(.2), step(.5,fract(p.x*.5+p.z*.3)));
  col *= (amb + dif*.7 + bac + occ*.6);
  col += vec3(1,.8,.5)*spec*.6;
  col = mix(col, vec3(.02,.02,.05), 1.-exp(-.012*length(p)*length(p)));
  return col;
}

void main(){
  vec2 uv = (gl_FragCoord.xy-.5*r)/r.y;
  vec3 fwd = normalize(target-eye);
  vec3 right = normalize(cross(fwd, vec3(0,1,0)));
  vec3 up = cross(right, fwd);
  vec3 rd = normalize(uv.x*right + uv.y*up + fwd*1.8);
  float tmin=.5, tmax=40., precis=.001;
  float th=0., d;
  vec3 p;
  for(int i=0;i<80;i++){
    p = eye + rd*th;
    d = scene(p);
    if(d<precis || th>tmax) break;
    th += d*.7;
  }
  vec3 col;
  if(th<tmax){
    vec3 n = norm(p);
    col = shade(p,n,rd);
  } else { col = vec3(.02,.02,.05); }
  float vig = 1.-.3*length(uv);
  col *= vig;
  o = vec4(col,1);
}`,

plasma: `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 r;
uniform float t;

void main(){
  vec2 uv = (gl_FragCoord.xy-.5*r)/r.y;
  float c = 0.;
  c += sin((uv.x*2.+uv.y)*3.+t*1.2);
  c += sin((uv.x-uv.y*2.)*4.-t*1.7);
  c += sin((uv.x+uv.y)*2.5+t*.9);
  c += sin(length(uv)*6.-t*2.1);
  c = sin(c*1.5+t*.4);
  vec3 col = .5+.5*cos(vec3(1.,2.,3.)*c+t*.5);
  col *= 1.-.3*length(uv);
  o = vec4(col,1);
}`,

mandelbrot: `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 r;
uniform float t;
uniform vec2 pan;
uniform float zoom;

void main(){
  vec2 uv = (gl_FragCoord.xy - 0.5*r) / r.y;
  vec2 c = uv * 3.0 / zoom + vec2(-0.45, 0.0) + pan;
  vec2 z = vec2(0.0);
  float it = 0.0;
  for(int i=0; i<300; i++){
    z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
    if(length(z) > 2.0) break;
    it = float(i);
  }
  float f = it / 300.0;
  vec3 col = mix(
    vec3(0.02, 0.01, 0.06),
    vec3(0.5 + 0.5*cos(vec3(1.0, 2.0, 3.0)*f*8.0 + t*0.15)), 
    smoothstep(0.0, 0.95, f)
  );
  col *= smoothstep(3.0, 0.0, length(uv));
  o = vec4(col, 1);
}`,

waves: `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 r;
uniform float t;

void main(){
  vec2 uv = (gl_FragCoord.xy-.5*r)/r.y;
  float d = length(uv);
  float wave = sin(uv.x*10.+t*2.)*.2+sin(uv.y*8.-t*1.5)*.2;
  float mask = smoothstep(.6+wave,.3+wave,d);
  vec3 col = mix(vec3(.05,.03,.12), vec3(.15,.55,.85), mask);
  col = mix(col, vec3(.95,.7,.15), (1.-smoothstep(0.,.8,d))*pow(mask,2.));
  col += vec3(.8,.5,.3)*pow(max(0.,1.-d*2.),4.);
  col *= 1.-.2*length(uv);
  o = vec4(col,1);
}`,

"neon-cube": `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 r;
uniform float t;
uniform vec3 eye, target;

float sdBox(vec3 p, vec3 b){vec3 d=abs(p)-b;return min(max(d.x,max(d.y,d.z)),0.)+length(max(d,0.));}
float sdSphere(vec3 p, float s){return length(p)-s;}

float scene(vec3 p){
  float cube = sdBox(p-vec3(0,1.2,0), vec3(1.));
  float sphere = sdSphere(p-vec3(0,2.8,0), .5);
  return min(cube, sphere);
}

vec3 norm(vec3 p){
  vec2 e=vec2(.001,0);
  return normalize(vec3(scene(p+e.xyy)-scene(p-e.xyy),
                        scene(p+e.yxy)-scene(p-e.yxy),
                        scene(p+e.yyx)-scene(p-e.yyx)));
}

void main(){
  vec2 uv = (gl_FragCoord.xy-.5*r)/r.y;
  vec3 fwd = normalize(target-eye);
  vec3 rgt = normalize(cross(fwd, vec3(0,1,0)));
  vec3 up = cross(rgt, fwd);
  vec3 rd = normalize(uv.x*rgt+uv.y*up+fwd*1.8);
  float th=.5, d;
  vec3 p;
  for(int i=0;i<60;i++){
    p = eye+rd*th;
    d = scene(p);
    if(d<.001||th>30.)break;
    th+=d*.7;
  }
  vec3 col;
  if(th<30.){
    vec3 n = norm(p);
    vec3 L = normalize(vec3(3,5,4));
    float dif = max(dot(n,L),0.)*.5+.25;
    float rim = 1.-max(dot(-rd,n),0.);
    col = vec3(.15,.5,1.)*dif;
    col += vec3(0.,.6,1.)*pow(rim,3.)*1.2;
    col += abs(fract(p*1.2)-.5)*.15;
    col += vec3(.8,.3,.6)*pow(max(0.,1.-length(p-vec3(0,2.8,0))*2.),2.);
  } else { col = vec3(0); }
  col *= 1.-.25*length(uv);
  o = vec4(col,1);
}`,

"water-3d": `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 r;
uniform float t;
uniform vec3 eye, target;

float wave(vec3 p) {
    float w = 0.0;
    w += sin(p.x*0.8 + p.z*1.2 + t*1.1) * 0.4;
    w += sin(p.x*1.9 - p.z*1.5 + t*2.3) * 0.2;
    w += sin(p.x*3.2 + p.z*2.8 + t*0.7) * 0.1;
    w += sin(p.x*5.5 - p.z*4.3 + t*3.7) * 0.05;
    w += sin((p.x+p.z)*1.2 - t*1.3) * 0.2;
    return w;
}

float scene(vec3 p) {
    return p.y - wave(p) + 0.8;
}

vec3 norm(vec3 p) {
    vec2 e = vec2(0.001, 0.0);
    return normalize(vec3(
        scene(p+e.xyy) - scene(p-e.xyy),
        scene(p+e.yxy) - scene(p-e.yxy),
        scene(p+e.yyx) - scene(p-e.yyx)
    ));
}

vec3 skyGradient(vec3 dir) {
    float y = max(dir.y, 0.0);
    vec3 col = mix(vec3(0.5, 0.7, 1.0), vec3(0.2, 0.25, 0.45), y);
    col = mix(col, vec3(0.8, 0.8, 0.9), exp(-6.0*y*y));
    vec3 sunDir = normalize(vec3(0.8, 1.2, 0.6));
    float sun = pow(max(dot(dir, sunDir), 0.0), 96.0);
    float glow = pow(max(dot(dir, sunDir), 0.0), 6.0) * 0.12;
    col += vec3(1.0, 0.9, 0.6) * sun;
    col += vec3(1.0, 0.6, 0.2) * glow;
    return col;
}

void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5*r) / r.y;
    vec3 fwd = normalize(target - eye);
    vec3 right = normalize(cross(fwd, vec3(0,1,0)));
    vec3 up = cross(right, fwd);
    vec3 rd = normalize(uv.x*right + uv.y*up + fwd*1.8);

    vec3 sky = skyGradient(rd);

    float th = 0.0;
    vec3 p;
    bool hit = false;
    for(int i=0; i<80; i++) {
        p = eye + rd * th;
        float d = scene(p);
        if(d < 0.001 && d > -0.5) { hit = true; break; }
        if(th > 50.0) break;
        th += d * 0.6;
    }

    vec3 col;
    if(hit) {
        vec3 n = norm(p);
        vec3 L = normalize(vec3(0.8, 1.2, 0.6));

        float fresnel = 0.02 + 0.98 * pow(1.0 - max(dot(-rd, n), 0.0), 4.0);

        vec3 reflDir = reflect(rd, n);
        vec3 reflCol = skyGradient(reflDir);

        float w = wave(p);
        vec3 refrCol = mix(vec3(0.01, 0.08, 0.18), vec3(0.0, 0.25, 0.12), w*0.5+0.5);

        float spec = pow(max(dot(reflect(-L, n), -rd), 0.0), 128.0);
        float dif = max(dot(n, L), 0.0);
        float foam = smoothstep(0.75, 1.0, w);

        col = mix(refrCol, reflCol, fresnel);
        col += vec3(1.0, 0.95, 0.7) * spec * 0.6;
        col += vec3(0.05, 0.15, 0.25) * dif * 0.2;
        col += vec3(1.0) * foam * 0.25;
        col *= exp(-0.006 * th);
    } else {
        col = sky;
    }

    col *= 1.0 - 0.2 * length(uv);
    o = vec4(col, 1.0);
}`,

"burning-ship": `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 r;
uniform float t;
uniform vec2 pan;
uniform float zoom;

void main(){
    vec2 uv = (gl_FragCoord.xy - 0.5*r) / r.y;
    vec2 c = uv * 3.0 / zoom + vec2(-0.4, -0.6) + pan;
    vec2 z = vec2(0.0);
    float it = 0.0;
    for(int i=0; i<300; i++){
        z = vec2(abs(z.x), abs(z.y));
        z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
        if(length(z) > 4.0) break;
        it = float(i);
    }
    float f = it / 300.0;
    vec3 col = 0.5 + 0.5*cos(vec3(1.0, 2.0, 3.0)*f*6.0 + length(z)*0.2 + t*0.08);
    col = mix(col, vec3(0.0), smoothstep(0.9, 1.0, f));
    col *= smoothstep(2.0, 0.0, length(uv));
    o = vec4(col, 1);
}`,

julia: `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 r;
uniform float t;
uniform vec2 pan;
uniform float zoom;

void main(){
    vec2 uv = (gl_FragCoord.xy - 0.5*r) / r.y;
    vec2 z = uv * 3.0 / zoom + pan;
    vec2 c = vec2(-0.7269 + sin(t*0.08)*0.1, 0.1889 + cos(t*0.1)*0.1);
    float it = 0.0;
    for(int i=0; i<200; i++){
        z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
        if(length(z) > 2.0) break;
        it = float(i);
    }
    float f = it / 200.0;
    vec3 col = 0.5 + 0.5*cos(vec3(0.5, 1.0, 2.0)*f*8.0 + t*0.05);
    col = mix(col, vec3(0.0), smoothstep(0.85, 1.0, f));
    col *= smoothstep(2.0, 0.0, length(uv));
    o = vec4(col, 1);
}`,

"deep-fractal": `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 r;
uniform float t;
uniform vec2 pan;
uniform float zoom;

void main(){
    vec2 uv = (gl_FragCoord.xy - 0.5*r) / r.y;
    vec2 c = uv * 3.0 / zoom + vec2(-0.4, 0.0) + pan;
    vec2 z = vec2(0.0);
    float it = 0.0;
    for(int i=0; i<300; i++){
        z = vec2(abs(z.x), abs(z.y));
        z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
        if(length(z) > 4.0) break;
        it = float(i);
    }
    float f = it / 300.0;
    vec3 col;
    float orbit = length(z);
    col = 0.5 + 0.5*cos(vec3(1.0, 2.0, 3.0)*f*10.0 + orbit*0.5 + t*0.1);
    col = mix(col, vec3(1.0), smoothstep(0.95, 1.0, f));
    col *= smoothstep(2.0, 0.0, length(uv));
    o = vec4(col, 1);
}`
};

// --- setup ---
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:true});
if(!gl){document.getElementById('app').innerHTML='<div style="color:red;padding:2rem;width:100%;text-align:center">WebGL2 not supported</div>';}

let W, H;
function resize(){
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio||1;
  const w = Math.floor(rect.width);
  const h = Math.floor(rect.height);
  if(w===Math.round(W/dpr)&&h===Math.round(H/dpr))return;
  W = w*dpr;
  H = h*dpr;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = w+'px';
  canvas.style.height = h+'px';
  gl.viewport(0,0,W,H);
}
new ResizeObserver(resize).observe(canvas.parentElement);
window.addEventListener('resize', resize);
resize();

// --- vertex shader ---
const VS_SRC = `#version 300 es\nin vec2 p;\nvoid main(){gl_Position=vec4(p,0,1);}`;
const vs = gl.createShader(gl.VERTEX_SHADER);
gl.shaderSource(vs, VS_SRC);
gl.compileShader(vs);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

function createProgram(fsSrc){
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, fsSrc);
  gl.compileShader(fs);
  if(!gl.getShaderParameter(fs, gl.COMPILE_STATUS)){
    const log = gl.getShaderInfoLog(fs);
    gl.deleteShader(fs);
    throw new Error(log);
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){
    const log = gl.getProgramInfoLog(prog);
    gl.deleteProgram(prog);
    gl.deleteShader(fs);
    throw new Error(log);
  }
  gl.deleteShader(fs);
  return prog;
}

let curProg = null;
let uR=null, uT=null, uEye=null, uTarget=null, uPan=null, uZoom=null;
let aP = null;

function useProgram(prog){
  curProg=prog; gl.useProgram(prog);
  aP=gl.getAttribLocation(prog,'p');
  gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
  gl.enableVertexAttribArray(aP);
  uR=gl.getUniformLocation(prog,'r');
  uT=gl.getUniformLocation(prog,'t');
  uEye=gl.getUniformLocation(prog,'eye');
  uTarget=gl.getUniformLocation(prog,'target');
  uPan=gl.getUniformLocation(prog,'pan');
  uZoom=gl.getUniformLocation(prog,'zoom');
}

function compileShader(src){
  try{
    const prog = createProgram(src||code.value);
    if(curProg)gl.deleteProgram(curProg);
    useProgram(prog);
    errEl.classList.remove('show');
  }catch(e){
    errEl.textContent = e.message;
    errEl.classList.add('show');
  }
}

// --- shader type detection ---
const THREE_D_SHADERS = new Set(['raymarcher', 'neon-cube', 'water-3d']);

// --- orbital camera (3D shaders) ---
let theta=0, phi=.6, dist=7;
let targetPos = [0,1.2,0];

// --- pan/zoom state (2D fractal shaders) ---
let panX = 0, panY = 0, zoomLevel = 1;

// --- interaction ---
let mx=0, my=0, down=false;

canvas.addEventListener('pointerdown',e=>{
  down=true; mx=e.clientX; my=e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove',e=>{
  if(!down)return;
  const dx=e.clientX-mx, dy=e.clientY-my;
  mx=e.clientX; my=e.clientY;
  if(THREE_D_SHADERS.has(select.value)){
    theta-=dx*.008;
    phi=Math.max(.1,Math.min(Math.PI/2-.1,phi+dy*.008));
  } else {
    const scale = 3.0 / zoomLevel / H;
    panX -= dx * scale;
    panY += dy * scale;
  }
});
canvas.addEventListener('pointerup',()=>{down=false;});
canvas.addEventListener('pointercancel',()=>{down=false;});
// smooth zoom via exp() — consistent on mice & trackpads
canvas.addEventListener('wheel',e=>{
  const k=.002;
  if(THREE_D_SHADERS.has(select.value)){
    dist=Math.max(2,Math.min(20,dist*Math.exp(e.deltaY*k)));
  }else{
    zoomLevel*=Math.exp(-e.deltaY*k);
    zoomLevel=Math.max(0.0001,Math.min(100000,zoomLevel));
  }
  e.preventDefault();
},{passive:false});

// double-click to reset pan/zoom on fractals
canvas.addEventListener('dblclick',()=>{
  if(!THREE_D_SHADERS.has(select.value)){
    panX=0; panY=0; zoomLevel=1;
  }
});

// --- pinch-to-zoom on mobile (base-state reference for smooth zoom) ---
let pinchStart={dist:0,zoom:1,dist3D:7};
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchStart.dist=Math.sqrt(dx*dx+dy*dy);
    pinchStart.zoom=zoomLevel;
    pinchStart.dist3D=dist;
  }
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const cur=Math.sqrt(dx*dx+dy*dy);
    if(pinchStart.dist>0){
      const ratio=cur/pinchStart.dist;
      if(THREE_D_SHADERS.has(select.value)){
        dist=Math.max(2,Math.min(20,pinchStart.dist3D/ratio));
      } else {
        zoomLevel=Math.max(0.0001,Math.min(100000,pinchStart.zoom*ratio));
      }
    }
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(e.touches.length<2)pinchStart.dist=0;
});

// --- render loop ---
let start = performance.now();
let errEl = document.getElementById('errors');
let zoomEl = document.getElementById('zoom-indicator');

function frame(){
  const sec = (performance.now()-start)/1000;
  if(curProg && W>0 && H>0){
    if(uR)gl.uniform2f(uR,W,H);
    if(uT)gl.uniform1f(uT,sec);
    if(uPan)gl.uniform2f(uPan,panX,panY);
    if(uZoom)gl.uniform1f(uZoom,zoomLevel);
    if(THREE_D_SHADERS.has(select.value)){
      const eye = [targetPos[0]+dist*Math.sin(theta)*Math.cos(phi),
                   targetPos[1]+dist*Math.sin(phi),
                   targetPos[2]+dist*Math.cos(theta)*Math.cos(phi)];
      if(uEye)gl.uniform3fv(uEye,eye);
      if(uTarget)gl.uniform3fv(uTarget,targetPos);
    }
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    // zoom indicator for 2D fractals
    if(THREE_D_SHADERS.has(select.value)){
      zoomEl.classList.remove('show');
    } else {
      zoomEl.classList.add('show');
      zoomEl.textContent = 'Zoom: ' + zoomLevel.toFixed(1) + 'x';
    }
  }
  requestAnimationFrame(frame);
}

// --- DOM ---
const code = document.getElementById('code');
const select = document.getElementById('shader-select');

function loadShader(name){
  const src = SHADERS[name];
  if(!src)return;
  code.value = src;
  panX=0; panY=0; zoomLevel=1;
  compileShader(src);
}

select.addEventListener('change',()=>loadShader(select.value));
document.getElementById('compile').addEventListener('click',()=>compileShader());
document.getElementById('reset').addEventListener('click',()=>loadShader(select.value));

code.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='Enter')compileShader();
});

// --- fullscreen (standard API + CSS fallback) ---
const fsBtn = document.getElementById('fs-btn');
const preview = document.getElementById('preview');
function setFS(on){
  preview.classList.toggle('fullscreen',on);
  setTimeout(resize,300);
}
fsBtn.addEventListener('click',()=>{
  if(document.fullscreenElement){
    document.exitFullscreen().catch(()=>setFS(false));
  }else{
    preview.requestFullscreen().catch(()=>{
      // CSS fallback when fullscreen API unavailable (iOS etc.)
      setFS(true);
    });
  }
});
document.addEventListener('fullscreenchange',()=>{
  setFS(!!document.fullscreenElement);
});

// --- init ---
loadShader('raymarcher');
frame();
</script>
</body>
</html>
