<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>vAPI test — ai-demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f0f11;
      color: #e4e4e7;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .sub { color: #71717a; font-size: 0.85rem; margin-bottom: 1.5rem; }
    #badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-live   { background: #065f46; color: #6ee7b7; }
    .badge-static { background: #78350f; color: #fcd34d; }
    .badge-error  { background: #7f1d1d; color: #fca5a5; }
    .badge-loading { background: #27272a; color: #a1a1aa; }

    .section { margin: 1.5rem 0; }
    .section h2 { font-size: 1rem; color: #a1a1aa; margin-bottom: 0.5rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th, td {
      text-align: left;
      padding: 0.4rem 0.6rem;
      border-bottom: 1px solid #27272a;
    }
    th { color: #71717a; font-weight: 600; }
    td { font-family: monospace; }
    tr:hover td { background: #1a1a1e; }
    .clickable { cursor: pointer; color: #6366f1; }
    .clickable:hover { text-decoration: underline; }

    pre {
      background: #18181b;
      border-radius: 6px;
      padding: 1rem;
      overflow: auto;
      font-size: 0.75rem;
      max-height: 400px;
    }
    .error { color: #fca5a5; background: #7f1d1d; padding: 0.5rem 1rem; border-radius: 4px; }
    .meta { color: #71717a; font-size: 0.75rem; }
  </style>
</head>
<body>
  <h1>vAPI test</h1>
  <div class="sub">virtual API client — live backend or static snapshot</div>
  <div><span id="badge" class="badge-loading">detecting…</span></div>

  <div class="section">
    <h2>Tables</h2>
    <div id="table-list"><span class="meta">loading…</span></div>
  </div>

  <div class="section">
    <h2>Table data</h2>
    <div id="table-data">
      <span class="meta">click a table name above</span>
    </div>
  </div>

  <div class="section">
    <h2>API info</h2>
    <pre id="info"><span class="meta">waiting…</span></pre>
  </div>

  <script src="../js/api-client.js"></script>
  <script>
    (function () {
      var api = new ApiClient();
      var badge = document.getElementById("badge");
      var tableList = document.getElementById("table-list");
      var tableData = document.getElementById("table-data");
      var info = document.getElementById("info");

      function setBadge(mode) {
        badge.textContent = mode;
        badge.className = "badge-" + mode;
      }

      function showError(el, msg) {
        el.innerHTML = '<div class="error">⚠ ' + msg + '</div>';
      }

      // ── Init ──────────────────────────────────────────────────
      api.init().then(function (mode) {
        setBadge(mode);
        renderTables();
        renderInfo();
      }).catch(function (err) {
        setBadge("error");
        showError(tableList, err.message);
      });

      // ── Render tables ─────────────────────────────────────────
      function renderTables() {
        api.getTables().then(function (tables) {
          if (!tables || tables.length === 0) {
            tableList.innerHTML = '<span class="meta">no tables</span>';
            return;
          }
          var html = '<table><thead><tr><th>Table</th><th>Rows</th></tr></thead><tbody>';
          var promises = tables.map(function (t) {
            return api.getManifest().then(function (m) {
              var found = m.tables && m.tables.filter(function (x) { return x.key === t; });
              var rows = (found && found.length > 0) ? found[0].rows : "?";
              return { name: t, rows: rows };
            }).catch(function () {
              return { name: t, rows: "?" };
            });
          });
          Promise.all(promises).then(function (items) {
            items.forEach(function (item) {
              html += '<tr><td class="clickable" data-table="' + item.name + '">'
                   + item.name + '</td><td>' + item.rows + '</td></tr>';
            });
            html += '</tbody></table>';
            tableList.innerHTML = html;

            // Click handler
            tableList.querySelectorAll(".clickable").forEach(function (td) {
              td.addEventListener("click", function () {
                renderTable(td.getAttribute("data-table"));
              });
            });
          });
        }).catch(function (err) {
          showError(tableList, err.message);
        });
      }

      // ── Render a single table ─────────────────────────────────
      function renderTable(name) {
        tableData.innerHTML = '<span class="meta">loading ' + name + '…</span>';
        api.getTable(name).then(function (rows) {
          if (!rows || rows.length === 0) {
            tableData.innerHTML = '<span class="meta">' + name + ': 0 rows</span>';
            return;
          }
          var cols = Object.keys(rows[0]);
          var html = '<div class="meta" style="margin-bottom:0.25rem">' + name
                   + ' — ' + rows.length + ' rows</div>';
          html += '<table><thead><tr>';
          cols.forEach(function (c) { html += '<th>' + c + '</th>'; });
          html += '</tr></thead><tbody>';
          rows.forEach(function (row) {
            html += '<tr>';
            cols.forEach(function (c) {
              var v = row[c];
              html += '<td>' + (v === null ? '<span style="color:#52525b">null</span>' : String(v).slice(0, 60)) + '</td>';
            });
            html += '</tr>';
          });
          html += '</tbody></table>';
          tableData.innerHTML = html;
        }).catch(function (err) {
          showError(tableData, err.message);
        });
      }

      // ── Render API info ───────────────────────────────────────
      function renderInfo() {
        var infoData = {
          mode: api.mode,
          baseURL: api.baseURL(),
          liveURL: api.liveURL,
          staticURL: api.staticURL,
        };
        api.getManifest().then(function (m) {
          infoData.manifest = m;
          info.textContent = JSON.stringify(infoData, null, 2);
        }).catch(function () {
          infoData.manifest = "(unavailable)";
          info.textContent = JSON.stringify(infoData, null, 2);
        });
      }
    })();
  </script>
</body>
</html>
