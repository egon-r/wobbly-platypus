<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- 背景：圆角矩形渐变 -->
  <defs>
    <linearGradient id="bg192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="36" fill="url(#bg192)"/>
  <!-- 装饰圆环 -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="96" cy="96" r="52" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- "PWA" 文字 -->
  <text x="96" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">PWA</text>
  <!-- 底部小装饰条 -->
  <rect x="60" y="132" width="72" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
</svg>
