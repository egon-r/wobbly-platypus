<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apps</title>
<style>
  body { background: #09090b; color: #e4e4e7; font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 4rem 1rem; }
  h1 { font-weight: 300; font-size: 2rem; margin-bottom: 2rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .card {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 0.75rem;
    padding: 1rem 1.25rem;
    position: relative;
    display: flex;
    flex-direction: column;
    transition: border-color .15s, background .15s;
    text-decoration: none;
    color: inherit;
  }
  .card:hover { border-color: #52525b; background: #1f1f23; }
  .card-name { font-size: 1.125rem; font-weight: 500; }
  .card-desc { font-size: 0.8rem; color: #71717a; margin-top: 0.15rem; flex: 1; }
  .card-date { font-size: 0.7rem; color: #52525b; margin-top: 0.5rem; }
  .star {
    position: absolute;
    top: 0.5rem;
    right: 0.75rem;
    font-size: 1.3rem;
    cursor: pointer;
    color: #a1a1aa;
    line-height: 1;
    user-select: none;
    z-index: 1;
  }
  .star.filled { color: #facc15; }
  .back { color: #52525b; font-size: 0.875rem; margin-top: 3rem; display: inline-block; }
  .back:hover { color: #a1a1aa; }
  @media (max-width: 599px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <h1>apps</h1>
  <div class="grid" id="appGrid"></div>
  <p><a class="back" href="/">back</a></p>
<script>
var apps = [
  { name: "hello", desc: "a friendly greeting", created: "2026-07-09T03:37:15+09:00" },
  { name: "calc", desc: "a pocket calculator", created: "2026-07-09T03:42:32+09:00" },
  { name: "myip", desc: "your public IP address", created: "2026-07-09T03:47:33+09:00" },
  { name: "dice", desc: "3D CSS cube roller", created: "2026-07-09T04:12:05+09:00" },
  { name: "raymarcher", desc: "shader previewer/editor — live GLSL editing, shader presets, orbit + zoom camera", created: "2026-07-10T01:05:04.471006+00:00" },
  { name: "sensors", desc: "Real-time device sensor monitor — gyroscope, accelerometer, geolocation, battery, network, screen, ambient light", created: "2026-07-11T12:00:00+00:00" },
  { name: "code-editor", desc: "Local-first HTML/CSS/JS playground with live preview — no backend", created: "2026-07-11T17:15:54.339450+00:00" }
];

(function() {
  var pad = function(n) { return String(n).padStart(2, '0'); };
  var fmtRel = function(ts) {
    var d = new Date(ts);
    var now = new Date();
    var diff = (now - d) / 1000;
    var days = Math.floor(diff / 86400);
    var timeStr = pad(d.getHours()) + ':' + pad(d.getMinutes());
    if (days === 0) return 'today at ' + timeStr;
    if (days === 1) return 'yesterday at ' + timeStr;
    if (days < 7) return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] + ' at ' + timeStr;
    return d.toLocaleDateString() + ' at ' + timeStr;
  };

  var favorites;
  try { favorites = JSON.parse(localStorage.getItem('favorite-apps') || '[]'); } catch(e) { favorites = []; }
  if (!Array.isArray(favorites)) favorites = [];

  var favSet = {};
  favorites.forEach(function(f) { favSet[f] = true; });

  var sortedApps = apps.slice().sort(function(a, b) {
    var af = favSet[a.name] ? 1 : 0;
    var bf = favSet[b.name] ? 1 : 0;
    if (af !== bf) return bf - af;
    return 0;
  });

  var grid = document.getElementById('appGrid');

  sortedApps.forEach(function(app) {
    var isFav = !!favSet[app.name];
    var card = document.createElement('a');
    card.className = 'card';
    card.href = '/apps/' + app.name + '.html';

    var star = document.createElement('span');
    star.className = 'star' + (isFav ? ' filled' : '');
    star.textContent = isFav ? '\u2605' : '\u2606';
    star.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      var nowFav = star.classList.toggle('filled');
      star.textContent = nowFav ? '\u2605' : '\u2606';
      var favs;
      try { favs = JSON.parse(localStorage.getItem('favorite-apps') || '[]'); } catch(e) { favs = []; }
      if (!Array.isArray(favs)) favs = [];
      if (nowFav) {
        if (favs.indexOf(app.name) === -1) favs.push(app.name);
      } else {
        var idx = favs.indexOf(app.name);
        if (idx !== -1) favs.splice(idx, 1);
      }
      localStorage.setItem('favorite-apps', JSON.stringify(favs));
    });

    var nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = app.name;

    var descEl = document.createElement('div');
    descEl.className = 'card-desc';
    descEl.textContent = app.desc;

    var dateEl = document.createElement('div');
    dateEl.className = 'card-date';
    dateEl.textContent = fmtRel(app.created);

    card.appendChild(star);
    card.appendChild(nameEl);
    card.appendChild(descEl);
    card.appendChild(dateEl);
    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
