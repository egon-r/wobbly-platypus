<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apps</title>
<style>
  body { background: #09090b; color: #e4e4e7; font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 4rem 1rem; }
  h1 { font-weight: 300; font-size: 2rem; margin-bottom: 2rem; }
  .cards { display: flex; flex-direction: column; gap: 0.75rem; }
  .card {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 0.75rem;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color .15s, background .15s;
    text-decoration: none;
    color: inherit;
  }
  .card:hover { border-color: #52525b; background: #1f1f23; }
  .card-name { font-size: 1.125rem; font-weight: 500; }
  .card-desc { font-size: 0.8rem; color: #71717a; margin-top: 0.15rem; }
  .card-arrow { color: #52525b; font-size: 1.25rem; transition: color .15s; }
  .card:hover .card-arrow { color: #a1a1aa; }
  .back { color: #52525b; font-size: 0.875rem; margin-top: 3rem; display: inline-block; }
  .back:hover { color: #a1a1aa; }
</style>
</head>
<body>
  <h1>apps</h1>
  <div class="cards">
    <a class="card" href="/apps/hello.html">
      <div>
        <div class="card-name">hello</div>
        <div class="card-desc">a friendly greeting</div>
      </div>
      <span class="card-arrow">→</span>
    </a>
    <a class="card" href="/apps/calc.html">
      <div>
        <div class="card-name">calc</div>
        <div class="card-desc">a pocket calculator</div>
      </div>
      <span class="card-arrow">→</span>
    </a>
    <a class="card" href="/apps/myip.html">
      <div>
        <div class="card-name">myip</div>
        <div class="card-desc">your public IP address</div>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>
  <p><a class="back" href="/">back</a></p>
</body>
</html>
