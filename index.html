<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ai-demo · egonr.dev</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f0f11;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    h1 span { color: #6366f1; }
    .warning {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #e4e4e7;
    }
    a { color: #6366f1; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #52525b;
    }
    .deploy-clock {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #52525b;
      font-variant-numeric: tabular-nums;
    }

    /* ── update toast ── */
    #update-toast {
      position: fixed;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: #065f46;
      color: #6ee7b7;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 0.85rem;
      transition: top 0.4s ease;
      z-index: 100;
      pointer-events: none;
    }
    #update-toast.show { top: 1rem; }
  </style>
</head>
<body>
  <div id="update-toast">✨ updated — reloading</div>
  <h1>ai-demo<span>.</span>egonr.dev</h1>
  <div class="warning">🐉 here be dragons — unstable experiments, half-built tools, usual ai stuff</div>
  <div class="deploy-clock" id="clock"></div>
  <div class="footer"><a href="https://egonr.dev">egonr.dev</a></div>
  <script>
    // ── deploy clock ──
    (function() {
      var deployed = new Date("2026-07-08T18:14:00Z");
      var el = document.getElementById("clock");
      function tick() {
        var diff = Math.floor((Date.now() - deployed.getTime()) / 1000);
        var s = diff % 60;
        var m = Math.floor(diff / 60) % 60;
        var h = Math.floor(diff / 3600);
        var parts = [];
        if (h > 0) parts.push(h + "h");
        if (m > 0) parts.push(m + "m");
        parts.push(s + "s");
        el.textContent = "deployed " + parts.join(" ") + " ago";
      }
      tick();
      setInterval(tick, 1000);
    })();

    // ── auto-reload on deploy ──
    (function() {
      var current = "2026-07-08T18:14:00Z";
      var toast = document.getElementById("update-toast");
      var polling = false;

      function check() {
        if (polling) return;
        polling = true;
        fetch("/index.html?_ts=" + Date.now())
          .then(function(r) { return r.text(); })
          .then(function(html) {
            var m = html.match(/var deployed = new Date\("([^"]+)"\)/);
            if (m && m[1] !== current) {
              toast.className = "show";
              setTimeout(function() { location.reload(true); }, 2000);
            }
          })
          .catch(function() {})
          .then(function() { polling = false; });
      }

      setInterval(check, 15000);
    })();
  </script>
</body>
</html>
