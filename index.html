<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ai-demo · egonr.dev</title>
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Courier New", Courier, monospace;
      background: #000;
      color: #b0b0b0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      box-sizing: border-box;
    }
    h1 {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #eee;
      text-shadow:
        3px  0 rgba(255,0,0,.35),
        -3px 0 rgba(0,255,255,.3),
        0 0 10px rgba(204,0,0,.3),
        0 0 30px rgba(204,0,0,.15),
        0 0 80px rgba(204,0,0,.08);
      animation: glitch 12s infinite;
      margin: 0;
    }
    h1 span { color: #cc0000; }
    @keyframes glitch {
      0%, 84%, 100% {
        text-shadow:
          3px  0 rgba(255,0,0,.35),
          -3px 0 rgba(0,255,255,.3),
          0 0 10px rgba(204,0,0,.3),
          0 0 30px rgba(204,0,0,.15),
          0 0 80px rgba(204,0,0,.08);
      }
      86% {
        text-shadow:
          10px  0 rgba(255,0,0,.5),
          -10px 0 rgba(0,255,255,.5),
          0 0 10px rgba(204,0,0,.3);
      }
      88% {
        text-shadow:
          -8px  0 rgba(255,0,0,.45),
          8px 0 rgba(0,255,255,.45),
          0 0 10px rgba(204,0,0,.3);
      }
      90% {
        text-shadow:
          5px  0 rgba(255,0,0,.4),
          -5px 0 rgba(0,255,255,.4),
          0 0 10px rgba(204,0,0,.3);
      }
      93% {
        text-shadow:
          -3px  0 rgba(255,0,0,.35),
          3px 0 rgba(0,255,255,.3),
          0 0 10px rgba(204,0,0,.3);
      }
    }
    .sub {
      margin-top: 0.6rem;
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0.5px 0 rgba(255,0,0,.15), -0.5px 0 rgba(0,255,255,.12);
    }
    /* ── CRT indicator light ── */
    #indicator {
      position: fixed;
      top: 1rem;
      right: 1.5rem;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
      font-family: "Courier New", Courier, monospace;
      pointer-events: none;
    }
    #indicator .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1a1a1a;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #indicator .dot.live {
      background: #00cc00;
      box-shadow: 0 0 8px #00cc00, 0 0 16px #00cc0066;
      animation: blink 1.6s ease-in-out infinite;
    }
    #indicator .dot.static {
      background: #cc8800;
      box-shadow: 0 0 6px #cc880088;
    }
    #indicator .dot.offline {
      background: #1a1a1a;
      box-shadow: none;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    #indicator .label { color: #444; }
    #indicator .label.live    { color: #00cc00; }
    #indicator .label.static  { color: #cc8800; }
    #indicator .label.offline { color: #444; }
    .warning {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #666;
      line-height: 1.5;
      text-shadow: 0.5px 0 rgba(255,0,0,.1), -0.5px 0 rgba(0,255,255,.08);
    }
    a { color: #cc0000; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: #444;
    }
    .footer a { color: #555; }
    .footer a:hover { color: #cc0000; }
    hr {
      width: 3rem;
      border: none;
      border-top: 1px solid #333;
      margin: 1.2rem auto;
    }
    /* ── CRT ambient glow ── */
    #crt-glow {
      position: fixed;
      inset: 0;
      z-index: 48;
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(60,15,15,.18) 0%, transparent 60%);
    }
    /* ── CRT vignette ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.7) 100%);
      pointer-events: none;
      z-index: 50;
    }
    /* ── CRT scanlines ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,.15) 0px,
        rgba(0,0,0,.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 51;
    }
    /* ── noise overlay ── */
    #noise {
      position: fixed;
      inset: 0;
      z-index: 52;
      pointer-events: none;
      opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      animation: noiseDrift 4s steps(4) infinite;
    }
    @keyframes noiseDrift {
      0%   { background-position: 0 0; }
      25%  { background-position: 128px 64px; }
      50%  { background-position: 64px 128px; }
      75%  { background-position: 192px 32px; }
      100% { background-position: 0 0; }
    }
    /* ── CRT beam sweep ── */
    #crt-beam {
      position: fixed;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 53;
      pointer-events: none;
      background: linear-gradient(to right,
        transparent 0%,
        rgba(204,0,0,.03) 20%,
        rgba(204,0,0,.08) 50%,
        rgba(204,0,0,.03) 80%,
        transparent 100%
      );
      animation: beamSweep 8s linear infinite;
      top: -3px;
    }
    @keyframes beamSweep {
      0% { top: -3px; }
      100% { top: 100vh; }
    }
    /* ── update toast ── */
    #update-toast {
      position: fixed;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a0000;
      color: #cc0000;
      padding: 0.6rem 1.2rem;
      border-radius: 0;
      font-size: 0.75rem;
      transition: top 0.4s ease;
      z-index: 100;
      pointer-events: none;
      font-family: "Courier New", Courier, monospace;
    }
    #update-toast.show { top: 1rem; }

    /* ── Live data dashboard ── */
    #dashboard {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      opacity: 0.85;
      transition: opacity 0.3s;
    }
    #dashboard.hidden { opacity: 0; }
    .dash-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .dash-item {
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
    }
    .dash-wide {
      min-width: 12rem;
    }
    .dash-label {
      color: #555;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
    }
    .dash-value {
      color: #999;
      font-family: "Courier New", Courier, monospace;
      transition: color 0.3s;
    }
    .dash-value.ping-green { color: #00cc00; }
    .dash-value.ping-yellow { color: #ccaa00; }
    .dash-value.ping-red { color: #cc3300; }
    .dash-unit {
      color: #444;
      font-size: 0.55rem;
    }
    .dash-value.dim { color: #444; }
  </style>
</head>
<body>
  <div id="crt-glow"></div>
  <div id="crt-beam"></div>
  <div id="noise"></div>
  <div id="update-toast">☐ updated — reloading</div>
  <h1>ai-demo<span>.</span>egonr.dev</h1>
  <div class="sub">present day. present time.</div>
  <hr>
  <div id="indicator"><span class="dot" id="dot"></span><span class="label" id="indlabel">—</span></div>
  <hr style="margin-top:0.8rem">
  <div class="warning">🐉 here be dragons<br>unstable experiments, half-built tools, usual ai stuff</div>

  <!-- ── Live data dashboard ── -->
  <div id="dashboard">
    <div class="dash-row">
      <div class="dash-item">
        <span class="dash-label">PING</span>
        <span class="dash-value" id="dash-ping">—</span>
        <span class="dash-unit">ms</span>
      </div>
      <div class="dash-item">
        <span class="dash-label">TABLES</span>
        <span class="dash-value" id="dash-tables">—</span>
      </div>
      <div class="dash-item">
        <span class="dash-label">ROWS</span>
        <span class="dash-value" id="dash-rows">—</span>
      </div>
    </div>
    <div class="dash-row">
      <div class="dash-item">
        <span class="dash-label">WEATHER</span>
        <span class="dash-value" id="dash-weather">—</span>
      </div>
      <div class="dash-item dash-wide">
        <span class="dash-label">UPDATED</span>
        <span class="dash-value" id="dash-updated">—</span>
      </div>
    </div>
  </div>

  <div class="footer"><a href="https://egonr.dev">egonr.dev</a> <span style="color:#333">·</span> <span id="hash" style="color:#333">crt004</span></div>

  <script src="js/api-client.js?v=crt004"></script>
  <script>
    // ── version for deploy detection ──
    var version = "crt004";

    // ── virtual API init ──
    (function() {
      var api = new ApiClient({ version: version });
      var dot = document.getElementById("dot");
      var indlabel = document.getElementById("indlabel");

      // Dashboard elements
      var dashPing = document.getElementById("dash-ping");
      var dashTables = document.getElementById("dash-tables");
      var dashRows = document.getElementById("dash-rows");
      var dashWeather = document.getElementById("dash-weather");
      var dashUpdated = document.getElementById("dash-updated");
      var dashboard = document.getElementById("dashboard");

      function setMode(m) {
        if (m === "live") {
          dot.className = "dot live";
          indlabel.className = "label live";
          indlabel.textContent = "LIVE";
        } else if (m === "static") {
          dot.className = "dot static";
          indlabel.className = "label static";
          indlabel.textContent = "STATIC";
        } else {
          dot.className = "dot offline";
          indlabel.className = "label offline";
          indlabel.textContent = "OFFLINE";
          // Hide dashboard in OFFLINE mode
          if (dashboard) dashboard.style.display = "none";
        }
      }

      function setPingColor(el, ms) {
        el.className = "dash-value";
        if (ms < 100) el.classList.add("ping-green");
        else if (ms < 300) el.classList.add("ping-yellow");
        else el.classList.add("ping-red");
      }

      function formatTime(isoStr) {
        if (!isoStr) return "—";
        var d = new Date(isoStr);
        var pad = function(n) { return n < 10 ? "0" + n : n; };
        return d.getUTCFullYear() + "-" + pad(d.getUTCMonth()+1) + "-" + pad(d.getUTCDate())
          + " " + pad(d.getUTCHours()) + ":" + pad(d.getUTCMinutes());
      }

      // Load status data (works in both live and static mode)
      function loadStatus() {
        api.getStatus().then(function(s) {
          if (dashTables) dashTables.textContent = s.tables;
          if (dashRows) dashRows.textContent = s.rows;
          if (dashUpdated) dashUpdated.textContent = formatTime(s.generated_at);
        }).catch(function() {
          // Status unavailable
          if (dashTables) dashTables.textContent = "—";
          if (dashRows) dashRows.textContent = "—";
          if (dashUpdated) dashUpdated.textContent = "—";
        });
      }

      // Ping measurement (different behavior per mode)
      function measurePing() {
        api.ping().then(function(ms) {
          if (dashPing) {
            dashPing.textContent = ms;
            setPingColor(dashPing, ms);
          }
        }).catch(function() {
          if (dashPing) {
            dashPing.textContent = "—";
            dashPing.className = "dash-value dim";
          }
        });
      }

      api.init().then(function(mode) {
        if (mode === "live") {
          setMode("live");
          // Start ping polling (every 10 seconds in live mode)
          measurePing();
          setInterval(measurePing, 10000);
          loadStatus();
        } else {
          // Confirm static data exists before declaring STATIC
          api.getHealth().then(function(h) {
            setMode("static");
            loadStatus();
            // In static mode, show known ping (0ms — no network call)
            if (dashPing) {
              dashPing.textContent = "—";
              dashPing.className = "dash-value dim";
            }
          }).catch(function() {
            setMode("offline");
          });
        }
      }).catch(function() {
        setMode("offline");
      });

      // ── auto-reload on deploy ──
      var toast = document.getElementById("update-toast");
      var polling = false;

      function check() {
        if (polling) return;
        polling = true;
        fetch("/index.html?_ts=" + Date.now())
          .then(function(r) { return r.text(); })
          .then(function(html) {
            var m = html.match(/var version = "([^"]+)"/);
            if (m && m[1] !== version) {
              toast.className = "show";
              setTimeout(function() { location.reload(true); }, 2000);
            }
          })
          .catch(function() {})
          .then(function() { polling = false; });
      }

      setInterval(check, 15000);
    })();
  </script>
</body>
</html>
