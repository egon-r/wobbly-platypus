<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ai-demo · egonr.dev</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f0f11;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-shadow: 0 0 12px rgba(99,102,241,.25), 0 0 40px rgba(99,102,241,.08);
    }
    h1 span { color: #6366f1; }
    .warning {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #e4e4e7;
    }
    a { color: #6366f1; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #52525b;
    }
    /* ── CRT vignette ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.55) 100%);
      pointer-events: none;
      z-index: 50;
    }
    /* ── CRT scanlines ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,.1) 0px,
        rgba(0,0,0,.1) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 50;
    }
    /* ── update toast ── */
    #update-toast {
      position: fixed;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: #065f46;
      color: #6ee7b7;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 0.85rem;
      transition: top 0.4s ease;
      z-index: 100;
      pointer-events: none;
    }
    #update-toast.show { top: 1rem; }
  </style>
</head>
<body>
  <div id="update-toast">✨ updated — reloading</div>
  <h1>ai-demo<span>.</span>egonr.dev</h1>
  <div class="warning">🐉 here be dragons - unstable experiments, half-built tools, usual ai stuff</div>
  <div class="footer"><a href="https://egonr.dev">egonr.dev</a> <span id="ver" style="color:#3f3f46">· <span id="hash">crt001</span></span></div>
  <script>
    // ── auto-reload on deploy ──
    (function() {
      var version = "crt001";
      var toast = document.getElementById("update-toast");
      var polling = false;

      function check() {
        if (polling) return;
        polling = true;
        fetch("/index.html?_ts=" + Date.now())
          .then(function(r) { return r.text(); })
          .then(function(html) {
            var m = html.match(/var version = "([^"]+)"/);
            if (m && m[1] !== version) {
              toast.className = "show";
              setTimeout(function() { location.reload(true); }, 2000);
            }
          })
          .catch(function() {})
          .then(function() { polling = false; });
      }

      setInterval(check, 15000);
    })();
  </script>
</body>
</html>
