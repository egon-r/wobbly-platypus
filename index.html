<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ai-demo · egonr.dev</title>
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Courier New", Courier, monospace;
      background: #000;
      color: #b0b0b0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      box-sizing: border-box;
    }
    h1 {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #eee;
      text-shadow:
        3px  0 rgba(255,0,0,.35),
        -3px 0 rgba(0,255,255,.3),
        0 0 12px rgba(204,0,0,.3),
        0 0 40px rgba(204,0,0,.1);
      animation: glitch 12s infinite;
      margin: 0;
    }
    h1 span { color: #cc0000; }
    @keyframes glitch {
      0%, 84%, 100% {
        text-shadow:
          3px  0 rgba(255,0,0,.35),
          -3px 0 rgba(0,255,255,.3),
          0 0 12px rgba(204,0,0,.3),
          0 0 40px rgba(204,0,0,.1);
      }
      86% {
        text-shadow:
          10px  0 rgba(255,0,0,.5),
          -10px 0 rgba(0,255,255,.5),
          0 0 12px rgba(204,0,0,.3);
      }
      88% {
        text-shadow:
          -8px  0 rgba(255,0,0,.45),
          8px 0 rgba(0,255,255,.45),
          0 0 12px rgba(204,0,0,.3);
      }
      90% {
        text-shadow:
          5px  0 rgba(255,0,0,.4),
          -5px 0 rgba(0,255,255,.4),
          0 0 12px rgba(204,0,0,.3);
      }
      93% {
        text-shadow:
          -3px  0 rgba(255,0,0,.35),
          3px 0 rgba(0,255,255,.3),
          0 0 12px rgba(204,0,0,.3);
      }
    }
    .sub {
      margin-top: 0.6rem;
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0.5px 0 rgba(255,0,0,.15), -0.5px 0 rgba(0,255,255,.12);
    }
    .warning {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #666;
      line-height: 1.5;
      text-shadow: 0.5px 0 rgba(255,0,0,.1), -0.5px 0 rgba(0,255,255,.08);
    }
    a { color: #cc0000; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: #444;
    }
    .footer a { color: #555; }
    .footer a:hover { color: #cc0000; }
    hr {
      width: 3rem;
      border: none;
      border-top: 1px solid #333;
      margin: 1.5rem auto;
    }
    /* ── CRT vignette ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.7) 100%);
      pointer-events: none;
      z-index: 50;
    }
    /* ── CRT scanlines ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,.15) 0px,
        rgba(0,0,0,.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 51;
    }
    /* ── noise overlay ── */
    #noise {
      position: fixed;
      inset: 0;
      z-index: 52;
      pointer-events: none;
      opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      animation: noiseDrift 4s steps(4) infinite;
    }
    @keyframes noiseDrift {
      0%   { background-position: 0 0; }
      25%  { background-position: 128px 64px; }
      50%  { background-position: 64px 128px; }
      75%  { background-position: 192px 32px; }
      100% { background-position: 0 0; }
    }
    /* ── CRT beam sweep ── */
    #crt-beam {
      position: fixed;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 53;
      pointer-events: none;
      background: linear-gradient(to right,
        transparent 0%,
        rgba(204,0,0,.03) 20%,
        rgba(204,0,0,.08) 50%,
        rgba(204,0,0,.03) 80%,
        transparent 100%
      );
      animation: beamSweep 8s linear infinite;
      top: -3px;
    }
    @keyframes beamSweep {
      0% { top: -3px; }
      100% { top: 100vh; }
    }
    /* ── update toast ── */
    #update-toast {
      position: fixed;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a0000;
      color: #cc0000;
      padding: 0.6rem 1.2rem;
      border-radius: 0;
      font-size: 0.75rem;
      transition: top 0.4s ease;
      z-index: 100;
      pointer-events: none;
      font-family: "Courier New", Courier, monospace;
    }
    #update-toast.show { top: 1rem; }
  </style>
</head>
<body>
  <div id="crt-beam"></div>
  <div id="noise"></div>
  <div id="update-toast">☐ updated — reloading</div>
  <h1>ai-demo<span>.</span>egonr.dev</h1>
  <div class="sub">present day. present time.</div>
  <hr>
  <div class="warning">🐉 here be dragons<br>unstable experiments, half-built tools, usual ai stuff</div>
  <div class="footer"><a href="https://egonr.dev">egonr.dev</a> <span style="color:#333">·</span> <span id="hash" style="color:#333">crt002</span></div>
  <script>
    // ── auto-reload on deploy ──
    (function() {
      var version = "crt002";
      var toast = document.getElementById("update-toast");
      var polling = false;

      function check() {
        if (polling) return;
        polling = true;
        fetch("/index.html?_ts=" + Date.now())
          .then(function(r) { return r.text(); })
          .then(function(html) {
            var m = html.match(/var version = "([^"]+)"/);
            if (m && m[1] !== version) {
              toast.className = "show";
              setTimeout(function() { location.reload(true); }, 2000);
            }
          })
          .catch(function() {})
          .then(function() { polling = false; });
      }

      setInterval(check, 15000);
    })();
  </script>
</body>
</html>
