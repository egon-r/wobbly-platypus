<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ai-demo · egonr.dev</title>
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Courier New", Courier, monospace;
      background: #000;
      color: #b0b0b0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      box-sizing: border-box;
    }
    h1 {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #eee;
      text-shadow:
        3px  0 rgba(255,0,0,.35),
        -3px 0 rgba(0,255,255,.3),
        0 0 10px rgba(204,0,0,.3),
        0 0 30px rgba(204,0,0,.15),
        0 0 80px rgba(204,0,0,.08);
      animation: glitch 12s infinite;
      margin: 0;
    }
    h1 span { color: #cc0000; }
    @keyframes glitch {
      0%, 84%, 100% {
        text-shadow:
          3px  0 rgba(255,0,0,.35),
          -3px 0 rgba(0,255,255,.3),
          0 0 10px rgba(204,0,0,.3),
          0 0 30px rgba(204,0,0,.15),
          0 0 80px rgba(204,0,0,.08);
      }
      86% {
        text-shadow:
          10px  0 rgba(255,0,0,.5),
          -10px 0 rgba(0,255,255,.5),
          0 0 10px rgba(204,0,0,.3);
      }
      88% {
        text-shadow:
          -8px  0 rgba(255,0,0,.45),
          8px 0 rgba(0,255,255,.45),
          0 0 10px rgba(204,0,0,.3);
      }
      90% {
        text-shadow:
          5px  0 rgba(255,0,0,.4),
          -5px 0 rgba(0,255,255,.4),
          0 0 10px rgba(204,0,0,.3);
      }
      93% {
        text-shadow:
          -3px  0 rgba(255,0,0,.35),
          3px 0 rgba(0,255,255,.3),
          0 0 10px rgba(204,0,0,.3);
      }
    }
    /* ── CRT indicator light ── */
    #indicator {
      position: fixed;
      top: 1rem;
      right: 1.5rem;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
      font-family: "Courier New", Courier, monospace;
      pointer-events: none;
    }
    #indicator .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1a1a1a;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #indicator .dot.live {
      background: #00cc00;
      box-shadow: 0 0 8px #00cc00, 0 0 16px #00cc0066;
      animation: blink 1.6s ease-in-out infinite;
    }
    #indicator .dot.static {
      background: #cc8800;
      box-shadow: 0 0 6px #cc880088;
    }
    #indicator .dot.offline {
      background: #1a1a1a;
      box-shadow: none;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    #indicator .label { color: #444; }
    #indicator .label.live    { color: #00cc00; }
    #indicator .label.static  { color: #cc8800; }
    #indicator .label.offline { color: #444; }
    a { color: #cc0000; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.12em;
      z-index: 60;
      pointer-events: none;
      font-family: "Courier New", Courier, monospace;
    }
    .footer span { display: inline-block; margin: 0 0.3rem; }
    .footer .tagline { font-size: 0.6rem; color: #444; text-transform: uppercase; letter-spacing: 0.15em; }
    /* ── CRT ambient glow ── */
    #crt-glow {
      position: fixed;
      inset: 0;
      z-index: 48;
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(60,15,15,.18) 0%, transparent 60%);
    }
    /* ── CRT vignette ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.7) 100%);
      pointer-events: none;
      z-index: 50;
    }
    /* ── CRT scanlines ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,.15) 0px,
        rgba(0,0,0,.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 51;
    }
    /* ── noise overlay ── */
    #noise {
      position: fixed;
      inset: 0;
      z-index: 52;
      pointer-events: none;
      opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      animation: noiseDrift 4s steps(4) infinite;
    }
    @keyframes noiseDrift {
      0%   { background-position: 0 0; }
      25%  { background-position: 128px 64px; }
      50%  { background-position: 64px 128px; }
      75%  { background-position: 192px 32px; }
      100% { background-position: 0 0; }
    }
    /* ── CRT beam sweep ── */
    #crt-beam {
      position: fixed;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 53;
      pointer-events: none;
      background: linear-gradient(to right,
        transparent 0%,
        rgba(204,0,0,.03) 20%,
        rgba(204,0,0,.08) 50%,
        rgba(204,0,0,.03) 80%,
        transparent 100%
      );
      animation: beamSweep 8s linear infinite;
      top: -3px;
    }
    @keyframes beamSweep {
      0% { top: -3px; }
      100% { top: 100vh; }
    }
    /* ── update toast ── */
    #update-toast {
      position: fixed;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a0000;
      color: #cc0000;
      padding: 0.6rem 1.2rem;
      border-radius: 0;
      font-size: 0.75rem;
      transition: top 0.4s ease;
      z-index: 100;
      pointer-events: none;
      font-family: "Courier New", Courier, monospace;
    }
    #update-toast.show { top: 1rem; }

    /* ── CRT clock ── */
    #clock {
      position: fixed;
      top: 1rem;
      left: 1.5rem;
      z-index: 60;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      color: #444;
      font-family: "Courier New", Courier, monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="crt-glow"></div>
  <div id="crt-beam"></div>
  <div id="noise"></div>
  <div id="update-toast">☐ updated — reloading</div>
  <h1>ai-demo<span>.</span>egonr.dev</h1>
  <div id="clock">—</div>
  <div id="indicator"><span class="dot" id="dot"></span><span class="label" id="indlabel">—</span></div>

  <div class="footer">
    <span class="tagline">present day. present time.</span>
    <span style="color:#333">·</span>
    <span><a href="https://egonr.dev" style="color:#555">egonr.dev</a></span>
    <span style="color:#333">·</span>
    <span style="color:#333" id="hash">crt004</span>
  </div>

  <script src="js/api-client.js?v=crt004"></script>
  <script>
    // ── version for deploy detection ──
    var version = "crt004";

    // ── clock ──
    (function() {
      var el = document.getElementById("clock");
      function tick() {
        var d = new Date();
        var pad = function(n) { return n < 10 ? "0" + n : n; };
        var s = pad(d.getMonth()+1) + "/" + pad(d.getDate()) + "/" + d.getFullYear()
          + " " + pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
        el.textContent = s;
      }
      tick();
      setInterval(tick, 1000);
    })();

    // ── virtual API init ──
    (function() {
      var api = new ApiClient({ version: version });
      var dot = document.getElementById("dot");
      var indlabel = document.getElementById("indlabel");

      function setMode(m) {
        if (m === "live") {
          dot.className = "dot live";
          indlabel.className = "label live";
          indlabel.textContent = "LIVE";
        } else if (m === "static") {
          dot.className = "dot static";
          indlabel.className = "label static";
          indlabel.textContent = "STATIC";
        } else {
          dot.className = "dot offline";
          indlabel.className = "label offline";
          indlabel.textContent = "OFFLINE";
        }
      }

      api.init().then(function(mode) {
        if (mode === "live") {
          setMode("live");
        } else {
          api.getHealth().then(function() {
            setMode("static");
          }).catch(function() {
            setMode("offline");
          });
        }
      }).catch(function() {
        setMode("offline");
      });

      // ── auto-reload on deploy ──
      var toast = document.getElementById("update-toast");
      var polling = false;

      function check() {
        if (polling) return;
        polling = true;
        fetch("/index.html?_ts=" + Date.now())
          .then(function(r) { return r.text(); })
          .then(function(html) {
            var m = html.match(/var version = "([^"]+)"/);
            if (m && m[1] !== version) {
              toast.className = "show";
              setTimeout(function() { location.reload(true); }, 2000);
            }
          })
          .catch(function() {})
          .then(function() { polling = false; });
      }

      setInterval(check, 15000);
    })();
  </script>
</body>
</html>
