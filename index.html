<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ai-demo · egonr.dev</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f0f11;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    h1 span { color: #6366f1; }
    .warning {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #e4e4e7;
    }
    a { color: #6366f1; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #52525b;
    }
    .deploy-clock {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #52525b;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <h1>ai-demo<span>.</span>egonr.dev</h1>
  <div class="warning">🐉 here be dragons — unstable experiments, half-built tools, usual ai stuff</div>
  <div class="deploy-clock" id="clock"></div>
  <div class="footer"><a href="https://egonr.dev">egonr.dev</a></div>
  <script>
    // ── deploy clock ──
    (function() {
      var deployed = new Date("2026-07-09T03:18:00+09:00");
      var el = document.getElementById("clock");
      function tick() {
        var diff = Math.floor((Date.now() - deployed.getTime()) / 1000);
        var s = diff % 60;
        var m = Math.floor(diff / 60) % 60;
        var h = Math.floor(diff / 3600);
        var parts = [];
        if (h > 0) parts.push(h + "h");
        if (m > 0) parts.push(m + "m");
        parts.push(s + "s");
        el.textContent = "deployed " + parts.join(" ") + " ago";
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
